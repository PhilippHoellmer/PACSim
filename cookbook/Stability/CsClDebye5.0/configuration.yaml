configuration_generator: LatticeBuilder
configuration_generator_parameters:
  lattice_specification: "../CsCl.cif"
  lattice_repeats: 15
  run_parameters_file: "run.yaml"
  radii_padding: !Quantity
    unit: nanometer
    value: 5.0
  lattice_padding: !Quantity
    unit: nanometer
    value: 10000.0  # 1926.155
  optimize_energy: true
  energy_scale_samples: 500
masses:
  "Cs": !Quantity
    unit: dalton
    value: 1.24898
  "Cl": !Quantity
    unit: dalton
    value: 1.0
radii:
  "Cs": !Quantity
    unit: nanometer
    value: 105.0
  "Cl": !Quantity
    unit: nanometer
    value: 97.5
surface_potentials:
  "Cs": !Quantity
    unit: millivolt
    value: -50.0
  "Cl": !Quantity
    unit: millivolt
    value: 50.0
initial_modifiers: null
initial_modifiers_parameters: null
final_modifiers: null
final_modifiers_parameters: null
